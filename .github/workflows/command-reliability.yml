name: Command reliability

on:
  # Keep this costly three-runner matrix opt-in until CI is needed again.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  NOMIFUN_EMBED_BUN: "0"
  RUST_BACKTRACE: "1"

jobs:
  command-reliability:
    name: Command reliability (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-24.04]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Self-test process runtime boundary scanner
        run: bun scripts/check-process-runtime-boundary.mjs --self-test

      - name: Check process runtime boundary
        run: bun run check:process-runtime-boundary

      - name: Check Agent vocabulary
        run: bun run check:agent-vocabulary

      - name: Check script registry
        run: bun run help --check

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Wave A crates
        run: cargo clippy -p sparkfox-sh-process-runtime -p sparkfox-be-ai-agent -p sparkfox-ag-tools -p sparkfox-ag-agent --all-targets --locked -- -D warnings

      - name: Test sparkfox-sh-process-runtime
        run: cargo test -p sparkfox-sh-process-runtime --locked -- --test-threads=1

      - name: Test sparkfox-ag-tools
        run: cargo test -p sparkfox-ag-tools --locked -- --test-threads=1

      - name: Test sparkfox-be-ai-agent
        run: cargo test -p sparkfox-be-ai-agent --locked -- --test-threads=1

      - name: Test Windows knowledge broker security boundary
        if: runner.os == 'Windows'
        run: cargo test -p sparkfox-be-knowledge --lib --locked windows_broker_ -- --test-threads=1
