name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run --filter=./ui build

      - name: Build Tauri desktop app
        run: bun run build

      - name: Upload artifacts to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = if ('${{ github.event.release.tag_name }}') { '${{ github.event.release.tag_name }}' } else { (gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName') }

          # NSIS installer
          $nsis = Get-ChildItem -Path "apps/desktop/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($nsis) {
            gh release upload $tag $nsis.FullName --repo ${{ github.repository }} --clobber
          }

          # MSI installer (if WiX is available)
          $msi = Get-ChildItem -Path "apps/desktop/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            gh release upload $tag $msi.FullName --repo ${{ github.repository }} --clobber
          }