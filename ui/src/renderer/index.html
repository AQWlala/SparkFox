<!doctype html>
<html data-theme="light" data-color-scheme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="SparkFox" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SparkFox" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4E5969" />
    <link rel="icon" type="image/png" href="./pwa/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa/icon-180.png" />
    <title>SparkFox</title>
    <script>
      // Synchronously restore theme from localStorage to prevent theme flash
      // SparkFox: read new `__sparkfox_*` keys first; fall back to legacy
      // `__nomifun_*` keys on the first load after upgrade (migrateThemeKeys()
      // in main.tsx copies old → new and deletes old, so subsequent loads
      // only find the new keys).
      (function () {
        try {
          var theme = localStorage.getItem('__sparkfox_theme') || localStorage.getItem('__nomifun_theme');
          var colorScheme = localStorage.getItem('__sparkfox_colorScheme') || localStorage.getItem('__nomifun_colorScheme');
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          }
          if (colorScheme) {
            document.documentElement.setAttribute('data-color-scheme', colorScheme);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      // Set arco-theme on body synchronously
      // SparkFox: read new `__sparkfox_theme` first, fall back to legacy `__nomifun_theme`.
      try {
        var t = localStorage.getItem('__sparkfox_theme') || localStorage.getItem('__nomifun_theme');
        if (t) document.body.setAttribute('arco-theme', t);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
