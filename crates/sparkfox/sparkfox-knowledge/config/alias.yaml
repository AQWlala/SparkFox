# Sub-Step 10.4.2 — 实体别名表（alias.yaml）
#
# ## 字段说明
#   canonical  规范名（作为 entity_id；alias 表自映射到自身）
#   aliases    别名列表（每个别名 → canonical）
#
# ## 分布（共 60 条 canonical，覆盖 3 类别名）
#   - 历史名 24 条（含合并尊称：孔子[孔丘/仲尼/夫子]、李白[太白/诗仙]、
#     苏轼[东坡/文忠]、诸葛亮[孔明/卧龙]、杜甫[子美/诗圣]）
#   - 尊称 16 条（不与历史名重复）
#   - 简称 20 条（中国高校）
#
# ## RISK-SAG-08
# 每条 canonical 与其 aliases 在 entity 表中归并为同一 entity_id；
# 未命中别名表的实体由调用方回退到 NFKC + 编辑距离（阈值 0.2）。

